<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Admin-Dashboard</title>
</head>
<body>

    <header>
        <div class="upper">
            <div class="searchIcon">SI</div>
            <input type="search" placeholder="  Search...">
            <div class="Spacer"></div>
            <div class="bellIcon">BI</div>
            <div class="userLogo">UL</div>
            <p>Unohana</p>
        </div>

        <div class="lower">
            <div class="UL"></div>
            <div class="userTxt">
                <p>Hi there,</p>
                <p>Unohana Retsu (@Unohana)</p>
            </div>
            <div class="Spacer"></div>
            <div class="button">New</div>
            <div class="button">Upload</div>
            <div class="button">Share</div>
        </div>
        

    </header>

    <aside class="sideBar">

        <h2>Dashboard</h2>

        <div class="item">Home</div>
        <div class="item">Profile</div>
        <div class="item">Messages</div>
        <div class="item">History</div>
        <div class="item">Tasks</div>
        <div class="item">Communinties</div>

        <div class="Spacer"></div>

        <div class="item">Settings</div>
        <div class="item">Support</div>
        <div class="item">Privacy</div>

        <div class="Spacer2"></div>

    </aside>

    <main class="content"></main>


</body>
</html>
